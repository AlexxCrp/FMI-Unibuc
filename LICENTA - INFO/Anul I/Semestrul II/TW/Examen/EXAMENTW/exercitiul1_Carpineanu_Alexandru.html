<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .box{
            height: 200px;
            width: 33vw;
            display: grid;
            grid-template-columns: 25% 25% 25% 25%;
        }
        .box > div{
            border:double green 6px;
        }
        .box > :nth-child(1){
            grid-column: 1/5;
        }
        .box > :nth-child(2){
            grid-row: 2/3;
            grid-column: 1/3;
        }
        .box > :nth-child(3){
            grid-row: 2/3;
            grid-column: 3/5;
        }
        .box > :nth-child(4){
            grid-column: 2/4;
            grid-row:3/4;
        }

        @media screen and (min-width:300px) and (max-width:550px){
        .box > :nth-child(2){
            display: none;
        }
        .box > :nth-child(3){
            display: none;
        }
        .box > :nth-child(4){
            display: none;
        }
        .box > div:hover {
            opacity: 0;
            transition: 3s;
        }
        }
        
    </style>
</head>

<body>
    <div class="box">
        <div>
            div1
        </div>
        <div>
            div2
        </div>
        <div>
            div3
        </div>
        <div>
            div4
        </div>
    
    </div>
</body>

</html>
